<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker· </title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pine: #1a2e1a;
    --forest: #2d4a2d;
    --sage: #5a7a5a;
    --moss: #8aaa7a;
    --mist: #c8d8c0;
    --snow: #f0f4ee;
    --sky: #7ab0c8;
    --gold: #c8a842;
    --sunset: #d46c3c;
    --stone: #8a7a6a;
    --paper: #faf8f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--pine);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    color: var(--snow);
    position: relative;
    overflow-x: hidden;
  }

  /* Mountainscape background */
  body::before {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 40vh;
    background: linear-gradient(to top, var(--forest) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .mountain-svg {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    width: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  .stars {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50vh;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.2; }
    100% { opacity: 1; }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    border-bottom: 1px solid rgba(138, 170, 122, 0.2);
  }

  .trek-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--moss);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    padding: 0.3rem 1rem;
    border: 1px solid var(--sage);
    border-radius: 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 900;
    line-height: 1.05;
    color: var(--snow);
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--gold);
    font-style: italic;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--mist);
    letter-spacing: 0.15em;
    margin-top: 0.6rem;
    opacity: 0.7;
  }

  /* Main layout */
  .container {
    position: relative;
    z-index: 10;
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.5rem 8rem;
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .summary-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(138, 170, 122, 0.2);
    border-radius: 16px;
    padding: 1.2rem 1rem;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: background 0.2s;
  }

  .summary-card:hover {
    background: rgba(255,255,255,0.08);
  }

  .summary-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--moss);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .summary-amount {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
  }

  .summary-amount.total {
    font-size: 1.8rem;
    color: var(--snow);
  }

  .summary-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--mist);
    opacity: 0.6;
    margin-top: 0.2rem;
  }

  /* Add expense section */
  .add-section {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(138, 170, 122, 0.25);
    border-radius: 20px;
    padding: 1.8rem;
    margin-bottom: 2rem;
    backdrop-filter: blur(10px);
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--mist);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::before {
    content: '';
    width: 20px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .form-group.full {
    grid-column: 1 / -1;
  }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--moss);
    text-transform: uppercase;
  }

  input, select, textarea {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(138, 170, 122, 0.25);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: var(--snow);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.1);
  }

  select option {
    background: var(--forest);
    color: var(--snow);
  }

  input::placeholder, textarea::placeholder {
    color: rgba(200, 216, 192, 0.35);
  }

  .add-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--gold);
    color: var(--pine);
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.4rem;
  }

  .add-btn:hover {
    background: #d4b450;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(200, 168, 66, 0.3);
  }

  .add-btn:active {
    transform: translateY(0);
  }

  /* Expense list */
  .list-section {}

  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .filter-tabs {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .filter-tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    border: 1px solid rgba(138, 170, 122, 0.3);
    background: transparent;
    color: var(--mist);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-tab.active {
    background: var(--sage);
    border-color: var(--sage);
    color: var(--snow);
  }

  /* Expense items */
  .expense-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .expense-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(138, 170, 122, 0.15);
    border-radius: 14px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: slideIn 0.3s ease;
    transition: background 0.2s;
  }

  .expense-item:hover {
    background: rgba(255,255,255,0.07);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .expense-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .expense-info {
    flex: 1;
    min-width: 0;
  }

  .expense-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--snow);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .expense-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--mist);
    opacity: 0.5;
    margin-top: 0.2rem;
    display: flex;
    gap: 0.6rem;
  }

  .expense-note {
    font-size: 0.75rem;
    color: var(--mist);
    opacity: 0.6;
    margin-top: 0.2rem;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .expense-amount {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
  }

  .expense-delete {
    background: none;
    border: none;
    color: rgba(200, 216, 192, 0.3);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.2rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .expense-delete:hover {
    color: var(--sunset);
  }

  /* Category colors */
  .cat-food { background: rgba(212, 108, 60, 0.2); }
  .cat-transport { background: rgba(122, 176, 200, 0.2); }
  .cat-stay { background: rgba(138, 170, 122, 0.2); }
  .cat-gear { background: rgba(200, 168, 66, 0.2); }
  .cat-entry { background: rgba(138, 122, 170, 0.2); }
  .cat-other { background: rgba(138, 122, 106, 0.2); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    opacity: 0.45;
  }

  .empty-state .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
  }

  .empty-state p {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--mist);
  }

  /* Category chart */
  .chart-section {
    margin-top: 2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(138, 170, 122, 0.2);
    border-radius: 20px;
    padding: 1.5rem;
  }

  .chart-bars {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .chart-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .chart-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--mist);
    width: 75px;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .chart-bar-wrap {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
  }

  .chart-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .chart-val {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--gold);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--forest);
    border: 1px solid var(--sage);
    color: var(--snow);
    padding: 0.75rem 1.5rem;
    border-radius: 30px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    z-index: 1000;
    transition: transform 0.3s ease;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Budget bar */
  .budget-section {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(138, 170, 122, 0.2);
    border-radius: 16px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
  }

  .budget-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
  }

  .budget-track {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }

  .budget-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--sage), var(--gold));
    transition: width 0.5s ease;
  }

  .budget-fill.danger {
    background: linear-gradient(90deg, var(--gold), var(--sunset));
  }

  .budget-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--moss);
    text-transform: uppercase;
  }

  .budget-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--mist);
  }

  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .summary-grid .summary-card:last-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Mountain silhouette -->
<svg class="mountain-svg" viewBox="0 0 1440 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0 300 L0 200 L120 120 L240 180 L360 80 L480 160 L600 40 L720 130 L840 60 L960 140 L1080 90 L1200 170 L1320 110 L1440 150 L1440 300 Z" fill="#2d4a2d"/>
  <path d="M0 300 L0 230 L180 160 L300 210 L480 140 L600 200 L720 160 L840 190 L960 150 L1080 180 L1200 140 L1320 175 L1440 155 L1440 300 Z" fill="#1a2e1a"/>
</svg>

<header>
  <div class="trek-badge">⛰</div>
  <h1>expensive <span>tracker</span></h1>
  <div class="subtitle">Your personal expense companion</div>
</header>

<div class="container">

  <!-- Summary -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">Total Spent</div>
      <div class="summary-amount total" id="totalAmount">₹0</div>
      <div class="summary-count" id="totalCount">0 expenses</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Today</div>
      <div class="summary-amount" id="todayAmount">₹0</div>
      <div class="summary-count" id="todayCount">0 items</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Avg / item</div>
      <div class="summary-amount" id="avgAmount">₹0</div>
      <div class="summary-count">per expense</div>
    </div>
  </div>

  <!-- Budget tracker -->
  <div class="budget-section">
    <div class="budget-header">
      <span class="budget-label">Budget Tracker</span>
      <div style="display:flex;align-items:center;gap:0.6rem;">
        <span class="budget-val" id="budgetRemain">Set budget →</span>
        <input type="number" id="budgetInput" placeholder="₹ Budget" style="width:110px;padding:0.35rem 0.6rem;font-size:0.75rem;border-radius:8px;" oninput="updateBudget()">
      </div>
    </div>
    <div class="budget-track">
      <div class="budget-fill" id="budgetFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Add Expense Form -->
  <div class="add-section">
    <div class="section-title">Add Expense</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Expense Name</label>
        <input type="text" id="expName" placeholder="e.g. Maggi at top" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="expAmount" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="expCategory">
          <option value="food">🍜 Food & Water</option>
          <option value="transport">🚌 Transport</option>
          <option value="stay">🏕 Stay / Camping</option>
          <option value="gear">🎒 Gear & Clothing</option>
          <option value="entry">🎫 Entry / Permits</option>
          <option value="other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="expDate" />
      </div>
      <div class="form-group full">
        <label>Note (optional)</label>
        <input type="text" id="expNote" placeholder="Any notes about this expense..." />
      </div>
    </div>
    <button class="add-btn" onclick="addExpense()">+ Add to Trek Log</button>
  </div>

  <!-- Filter & List -->
  <div class="list-section">
    <div class="list-header">
      <div class="section-title" style="margin-bottom:0">Trek Log</div>
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-cat="all" onclick="setFilter('all', this)">All</button>
        <button class="filter-tab" data-cat="food" onclick="setFilter('food', this)">Food</button>
        <button class="filter-tab" data-cat="transport" onclick="setFilter('transport', this)">Transport</button>
        <button class="filter-tab" data-cat="stay" onclick="setFilter('stay', this)">Stay</button>
        <button class="filter-tab" data-cat="gear" onclick="setFilter('gear', this)">Gear</button>
        <button class="filter-tab" data-cat="entry" onclick="setFilter('entry', this)">Entry</button>
        <button class="filter-tab" data-cat="other" onclick="setFilter('other', this)">Other</button>
      </div>
    </div>

    <div class="expense-list" id="expenseList">
      <div class="empty-state">
        <div class="empty-icon">🏔</div>
        <p>No expenses yet<br>Start tracking your trek costs!</p>
      </div>
    </div>
  </div>

  <!-- Category Chart -->
  <div class="chart-section" id="chartSection" style="display:none;">
    <div class="section-title">Spending by Category</div>
    <div class="chart-bars" id="chartBars"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for(let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      top:${Math.random()*90}%;left:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${2+Math.random()*3}s;
    `;
    starsEl.appendChild(s);
  }

  // Set today's date
  document.getElementById('expDate').valueAsDate = new Date();

  // Data
  let expenses = JSON.parse(localStorage.getItem('triund_expenses') || '[]');
  let activeFilter = 'all';

  const CATS = {
    food:      { label: 'Food & Water', icon: '🍜', color: '#d46c3c' },
    transport: { label: 'Transport',    icon: '🚌', color: '#7ab0c8' },
    stay:      { label: 'Stay',         icon: '🏕', color: '#8aaa7a' },
    gear:      { label: 'Gear',         icon: '🎒', color: '#c8a842' },
    entry:     { label: 'Entry',        icon: '🎫', color: '#a88ac8' },
    other:     { label: 'Other',        icon: '📦', color: '#8a7a6a' },
  };

  function save() {
    localStorage.setItem('triund_expenses', JSON.stringify(expenses));
  }

  function fmt(n) {
    return '₹' + Number(n).toLocaleString('en-IN');
  }

  function addExpense() {
    const name = document.getElementById('expName').value.trim();
    const amount = parseFloat(document.getElementById('expAmount').value);
    const category = document.getElementById('expCategory').value;
    const date = document.getElementById('expDate').value;
    const note = document.getElementById('expNote').value.trim();

    if (!name) { showToast('Please enter an expense name'); return; }
    if (!amount || amount <= 0) { showToast('Please enter a valid amount'); return; }
    if (!date) { showToast('Please select a date'); return; }

    const exp = { id: Date.now(), name, amount, category, date, note };
    expenses.unshift(exp);
    save();
    render();

    document.getElementById('expName').value = '';
    document.getElementById('expAmount').value = '';
    document.getElementById('expNote').value = '';
    showToast('✓ Expense added to trek log!');
  }

  function deleteExpense(id) {
    expenses = expenses.filter(e => e.id !== id);
    save();
    render();
    showToast('Expense removed');
  }

  function setFilter(cat, btn) {
    activeFilter = cat;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function updateBudget() {
    render();
  }

  function render() {
    const total = expenses.reduce((s, e) => s + e.amount, 0);
    const today = new Date().toISOString().slice(0, 10);
    const todayExp = expenses.filter(e => e.date === today);
    const todayTotal = todayExp.reduce((s, e) => s + e.amount, 0);
    const avg = expenses.length ? (total / expenses.length) : 0;

    document.getElementById('totalAmount').textContent = fmt(total);
    document.getElementById('totalCount').textContent = expenses.length + ' expense' + (expenses.length !== 1 ? 's' : '');
    document.getElementById('todayAmount').textContent = fmt(todayTotal);
    document.getElementById('todayCount').textContent = todayExp.length + ' item' + (todayExp.length !== 1 ? 's' : '');
    document.getElementById('avgAmount').textContent = fmt(Math.round(avg));

    // Budget
    const budget = parseFloat(document.getElementById('budgetInput').value);
    if (budget > 0) {
      const pct = Math.min((total / budget) * 100, 100);
      document.getElementById('budgetFill').style.width = pct + '%';
      document.getElementById('budgetFill').className = 'budget-fill' + (pct >= 80 ? ' danger' : '');
      const remain = budget - total;
      document.getElementById('budgetRemain').textContent = remain >= 0
        ? fmt(remain) + ' left'
        : fmt(Math.abs(remain)) + ' over!';
    }

    // Filtered list
    const filtered = activeFilter === 'all' ? expenses : expenses.filter(e => e.category === activeFilter);
    const listEl = document.getElementById('expenseList');

    if (filtered.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🏔</div><p>${activeFilter === 'all' ? 'No expenses yet<br>Start tracking your trek costs!' : 'No ' + CATS[activeFilter].label + ' expenses yet'}</p></div>`;
    } else {
      listEl.innerHTML = filtered.map(e => {
        const cat = CATS[e.category];
        const dateStr = new Date(e.date + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        return `<div class="expense-item">
          <div class="expense-icon cat-${e.category}">${cat.icon}</div>
          <div class="expense-info">
            <div class="expense-name">${e.name}</div>
            <div class="expense-meta">
              <span>${dateStr}</span>
              <span>${cat.label}</span>
            </div>
            ${e.note ? `<div class="expense-note">${e.note}</div>` : ''}
          </div>
          <div class="expense-amount">${fmt(e.amount)}</div>
          <button class="expense-delete" onclick="deleteExpense(${e.id})" title="Remove">✕</button>
        </div>`;
      }).join('');
    }

    // Chart
    const catTotals = {};
    expenses.forEach(e => {
      catTotals[e.category] = (catTotals[e.category] || 0) + e.amount;
    });

    const chartSection = document.getElementById('chartSection');
    if (Object.keys(catTotals).length > 0) {
      chartSection.style.display = 'block';
      const maxVal = Math.max(...Object.values(catTotals));
      document.getElementById('chartBars').innerHTML = Object.entries(catTotals)
        .sort((a, b) => b[1] - a[1])
        .map(([cat, val]) => {
          const pct = (val / maxVal) * 100;
          const c = CATS[cat];
          return `<div class="chart-row">
            <div class="chart-label">${c.icon} ${c.label.split(' ')[0]}</div>
            <div class="chart-bar-wrap">
              <div class="chart-bar-fill" style="width:${pct}%;background:${c.color}"></div>
            </div>
            <div class="chart-val">${fmt(val)}</div>
          </div>`;
        }).join('');
    } else {
      chartSection.style.display = 'none';
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  render();
</script>
</body>
</html>
